name: Build Packages
on:
  push:
    branches: [main, develop, major]
  pull_request:
    branches: [main, develop, major]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies 📦
        run: npm ci

      - name: Build packages 🛠️
        run: npm run build
